version: '2'

run:
  timeout: 5m

linters:
  # Standard group: errcheck, govet, ineffassign, staticcheck, unused.
  default: standard
  enable:
    - bodyclose
    - copyloopvar
    - errorlint
    - exhaustive
    - forbidigo
    - gocritic
    - gosec
    - misspell
    - nilerr
    - noctx
    - revive
    - unconvert
    - unparam
    - wastedassign
  settings:
    gosec:
      excludes:
        # G204 (audit: subprocess with non-constant command/args) is
        # structurally incompatible with this agent: its core function is
        # launching hypervisor tooling (vagrant, VBoxManage, git, the user's
        # browser) with runtime arguments, so the rule would permanently flag
        # every legitimate exec. Command-injection protection remains fully
        # enforced by G702 (taint analysis, enabled) and by the mandatory
        # internal/safepath validation every spawned path passes first.
        # Decision: Mark, 2026-07-05.
        - G204
    govet:
      enable-all: true
      disable:
        - fieldalignment
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
    exhaustive:
      default-signifies-exhaustive: true
    forbidigo:
      forbid:
        # The Windows GUI build has no console: stdout/stderr prints are
        # invisible by definition. Diagnostics go through log/slog.
        - pattern: ^fmt\.Print.*$
          msg: no console printing — use log/slog (GUI builds have no console)
        - pattern: ^print(ln)?$
          msg: no console printing — use log/slog
  exclusions:
    # std-error-handling only; deliberately NOT common-false-positives so
    # every finding stays visible. Findings are fixed in code — never
    # suppressed inline; a rule-level exclusion (see gosec above) requires an
    # explicit recorded decision.
    presets:
      - std-error-handling

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/Makr91/hyperweaver-agent
