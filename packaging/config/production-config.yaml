# Hyperweaver Agent configuration (Debian service install)
# Installed to /etc/hyperweaver-agent/config.yaml — used by the systemd unit
# (hyperweaver-agent --headless --config /etc/hyperweaver-agent/config.yaml).
# Desktop/tray sessions use the per-user config instead
# (~/.config/hyperweaver-agent/config.yaml).

server:
  # Address the web server binds to. Keep 127.0.0.1 unless you know you want
  # the agent reachable from other machines.
  bind_address: 127.0.0.1
  port: 9420

ui:
  # Serve the bundled Hyperweaver UI at /ui/ (and / redirects there).
  enabled: true
  # Optional: serve the UI from this directory instead of the copy embedded in
  # the binary. Leave empty for normal operation.
  path: ''

browser:
  # Unused in headless service mode; in tray mode, full path to the browser
  # the "Open" action launches. Empty = system default browser.
  path: ''

logging:
  # error | warn | info | debug
  level: info
  # Console output is captured by the systemd journal.
  console: true
  file: /var/log/hyperweaver-agent/agent.log
  max_size_mb: 20
  max_backups: 5
