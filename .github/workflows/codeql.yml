name: CodeQL

# Reusable: chained from ci.yml (which runs on every PR and, via release-please.yml,
# on every push to main) — no direct push/pull_request triggers here or CodeQL would
# run twice per event. The weekly schedule still scans independent of pushes.
on:
  workflow_call:
  schedule:
    - cron: '37 5 * * 3'

permissions:
  security-events: write
  packages: read
  actions: read
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          # CodeQL supports only autobuild/manual for Go (build-mode none is
          # not available for Go). The committed webui placeholder keeps the
          # go:embed build green without the UI artifact.
          - language: go
            build-mode: autobuild

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{matrix.language}}'
