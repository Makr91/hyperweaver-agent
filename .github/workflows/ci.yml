name: CI

# Reusable CI. Called by release-please.yml on push to main, and run directly on
# every PR. Lints + builds on all three OS targets, scans for vulnerable
# dependencies, then chains CodeQL — same layout as hyperweaver-server / ui / docs.

on:
  workflow_call:
  pull_request:
    branches: ['main']

permissions:
  contents: read
  security-events: write
  packages: read
  actions: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12

  build:
    name: Build (${{ matrix.os }})
    # A matrix, not cross-compilation: the macOS tray needs cgo, so the darwin
    # binary can only be built (and vetted) on a macOS runner.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

  govulncheck:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod

  codeql-analysis:
    name: CodeQL
    needs: [lint, build]
    uses: ./.github/workflows/codeql.yml
