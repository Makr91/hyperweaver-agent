name: Build Packages

# Builds and publishes the Windows, macOS, and Linux applications for a release.
# Modeled on Super.Human.Installer's release pipeline, simplified for Go:
# hosted runners, Inno Setup (preinstalled on windows-latest), hand-built
# .app + productbuild on macOS, dpkg-deb on Linux. Signing/notarization steps
# run only when the corresponding secrets are configured, so forks and early
# releases still build.

on:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
      version:
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    env:
      # secrets are not usable in step `if:` expressions — evaluate here.
      HAVE_WINDOWS_SIGNING: ${{ secrets.SM_HOST != '' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Bake Hyperweaver UI artifact
        shell: bash
        run: |
          UI_VERSION="$(tr -d ' \r\n' < .ui-version)"
          echo "Baking hyperweaver-ui v${UI_VERSION}"
          rm -rf internal/webui/dist
          mkdir -p internal/webui/dist
          curl -fsSL "https://github.com/MarkProminic/hyperweaver-ui/releases/download/v${UI_VERSION}/hyperweaver-ui-${UI_VERSION}.tar.gz" | tar -xz -C internal/webui/dist

      - name: Stage provisioner seed archives
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Seed contract (arch item 2, Mark's ruling: provisioners travel as
          # tars, pulled as git artifacts): each provisioner repo's latest
          # release carries a registry-shaped .tar.gz laid out as
          # <name>/<version>/... — built by the repo's release CI from a
          # submodules-recursive checkout (NOT git archive, which omits
          # submodules) — that the agent extracts on startup, never
          # overwriting existing versions (a missing collection manifest is
          # synthesized by the seeder). Missing assets are tolerated:
          # dev/fork builds proceed seedless.
          mkdir -p packaging/provisioners-seed
          for repo in STARTcloud/startcloud_generic_provisioner STARTcloud/hcl_domino_standalone_provisioner STARTcloud/hcl_domino_additional_provisioner; do
            # Dual-asset releases (Provisioner AI, 2026-07-06): a versioned
            # tar.gz plus a version-less stable one — fetch ONLY the
            # version-less asset so the seed never carries duplicates.
            asset="${repo##*/}.tar.gz"
            if gh release download --repo "$repo" --pattern "$asset" --dir packaging/provisioners-seed; then
              echo "Staged seed archive(s) from $repo"
            else
              echo "WARNING: no seed archive from $repo — building without it"
            fi
          done
          ls -la packaging/provisioners-seed

      - name: Stage STARTcloud PKI from the pinned core driver
        shell: bash
        run: |
          # Shape-A PKI (Mark's ruling, sync 2026-07-17), pulled at build time
          # from the core_provisioner release pinned in driver.version — the
          # single source of truth (build-provisioner.yml's exact fetch+verify
          # mechanics). packaging/ssl is gitignored — nothing is committed;
          # this step populates it, so a rotation is ONLY a pin bump.
          # The intermediate key ships passphrase-encrypted; the passphrase is
          # PUBLIC BY DESIGN (the intermediate mints leaves with no secrets —
          # only the root key is private, and it stays offline), so decrypting
          # here is the ruled packaging step, not a leak.
          TAG="$(tr -d '[:space:]' < driver.version)"
          VERSION="${TAG#v}"
          ARCHIVE="core_provisioner-${VERSION}.tar.gz"
          BASE="https://github.com/STARTcloud/core_provisioner/releases/download/${TAG}"
          echo "Fetching core driver ${TAG}"
          curl -fsSL -o "$RUNNER_TEMP/$ARCHIVE" "$BASE/$ARCHIVE"
          curl -fsSL -o "$RUNNER_TEMP/$ARCHIVE.sha256" "$BASE/$ARCHIVE.sha256"
          EXPECTED="$(awk '{print $1}' "$RUNNER_TEMP/$ARCHIVE.sha256")"
          ACTUAL="$(openssl dgst -sha256 -r "$RUNNER_TEMP/$ARCHIVE" | awk '{print $1}')"
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "Checksum mismatch for $ARCHIVE: expected $EXPECTED, got $ACTUAL" >&2
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/core-driver"
          # tar on the Windows runner reads the "D:" in an absolute path as a
          # REMOTE HOSTNAME (the Git-Bash tar colon trap — runtime-proven
          # 2026-07-17: "Cannot connect to D: resolve failed"); extracting
          # with relative paths from inside $RUNNER_TEMP sidesteps it on
          # every OS.
          (cd "$RUNNER_TEMP" && tar -xzf "$ARCHIVE" -C core-driver)
          CA="$RUNNER_TEMP/core-driver/driver/ssls/ca"
          for f in root-ca.crt ca-certificate.crt ca-certificate.key; do
            test -f "$CA/$f" || { echo "$f missing from the core driver archive" >&2; exit 1; }
          done
          mkdir -p packaging/ssl
          cp "$CA/root-ca.crt" packaging/ssl/root-ca.crt
          cp "$CA/ca-certificate.crt" packaging/ssl/ca-certificate.crt
          openssl pkey -in "$CA/ca-certificate.key" -out packaging/ssl/ca-certificate.key -passin 'pass:STARTcloud24@!'

      - name: Embed Windows resources (icon, version info)
        shell: bash
        run: |
          go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest
          goversioninfo -platform-specific=true \
            -product-version "${{ inputs.version }}" \
            -file-version "${{ inputs.version }}.0" \
            -ver-major "$(echo '${{ inputs.version }}' | cut -d. -f1)" \
            -ver-minor "$(echo '${{ inputs.version }}' | cut -d. -f2)" \
            -ver-patch "$(echo '${{ inputs.version }}' | cut -d. -f3)"

      - name: Build
        shell: bash
        run: |
          mkdir -p bin dist
          CGO_ENABLED=0 go build -trimpath \
            -ldflags "-H=windowsgui -s -w -X github.com/Makr91/hyperweaver-agent/internal/version.Version=${{ inputs.version }}" \
            -o bin/hyperweaver-agent.exe .

      - name: Sign binary
        if: ${{ env.HAVE_WINDOWS_SIGNING == 'true' }}
        uses: moonshine-ide/digicert-sign-action@v1.1
        with:
          bin-path: bin/hyperweaver-agent.exe
          sm-host: ${{ secrets.SM_HOST }}
          sm-api-key: ${{ secrets.SM_API_KEY }}
          sm-client-cert-file-b64: ${{ secrets.SM_CLIENT_CERT_FILE_B64 }}
          sm-client-cert-password: ${{ secrets.SM_CLIENT_CERT_PASSWORD }}
          sm-thumbprint: ${{ secrets.SM_THUMBPRINT }}
          sm-keypair-alias: ${{ secrets.SM_KEYPAIR_ALIAS }}

      - name: Create Inno Setup installer
        shell: pwsh
        run: |
          & 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe' `
            /DAppVersion=${{ inputs.version }} `
            packaging\windows\hyperweaver-agent.iss

      - name: Sign installer
        if: ${{ env.HAVE_WINDOWS_SIGNING == 'true' }}
        uses: moonshine-ide/digicert-sign-action@v1.1
        with:
          bin-path: dist/HyperweaverAgent-Setup.exe
          sm-host: ${{ secrets.SM_HOST }}
          sm-api-key: ${{ secrets.SM_API_KEY }}
          sm-client-cert-file-b64: ${{ secrets.SM_CLIENT_CERT_FILE_B64 }}
          sm-client-cert-password: ${{ secrets.SM_CLIENT_CERT_PASSWORD }}
          sm-thumbprint: ${{ secrets.SM_THUMBPRINT }}
          sm-keypair-alias: ${{ secrets.SM_KEYPAIR_ALIAS }}

      - name: Zip bare binary
        shell: bash
        run: |
          cd bin
          7z a "../dist/HyperweaverAgent-${{ inputs.version }}-windows-amd64.zip" hyperweaver-agent.exe

      - name: Upload release assets
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ inputs.tag_name }}" \
            dist/HyperweaverAgent-Setup.exe \
            "dist/HyperweaverAgent-${{ inputs.version }}-windows-amd64.zip" \
            --clobber

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    env:
      # secrets are not usable in step `if:` expressions — evaluate here.
      HAVE_MAC_SIGNING: ${{ secrets.MAC_KEYCHAIN_PASS != '' }}
      HAVE_MAC_NOTARIZATION: ${{ secrets.MAC_NOTARIZATION_APPLE_ID != '' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Bake Hyperweaver UI artifact
        run: |
          UI_VERSION="$(tr -d ' \r\n' < .ui-version)"
          echo "Baking hyperweaver-ui v${UI_VERSION}"
          rm -rf internal/webui/dist
          mkdir -p internal/webui/dist
          curl -fsSL "https://github.com/MarkProminic/hyperweaver-ui/releases/download/v${UI_VERSION}/hyperweaver-ui-${UI_VERSION}.tar.gz" | tar -xz -C internal/webui/dist

      - name: Stage provisioner seed archives
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Same seed contract as the Windows job: registry-shaped .tar.gz
          # release assets from the provisioner repos; missing assets tolerated.
          mkdir -p packaging/provisioners-seed
          for repo in STARTcloud/startcloud_generic_provisioner STARTcloud/hcl_domino_standalone_provisioner STARTcloud/hcl_domino_additional_provisioner; do
            # Dual-asset releases (Provisioner AI, 2026-07-06): a versioned
            # tar.gz plus a version-less stable one — fetch ONLY the
            # version-less asset so the seed never carries duplicates.
            asset="${repo##*/}.tar.gz"
            if gh release download --repo "$repo" --pattern "$asset" --dir packaging/provisioners-seed; then
              echo "Staged seed archive(s) from $repo"
            else
              echo "WARNING: no seed archive from $repo — building without it"
            fi
          done
          ls -la packaging/provisioners-seed

      - name: Stage STARTcloud PKI from the pinned core driver
        run: |
          # Same contract as the Windows job's PKI step: packaging/ssl is
          # gitignored, populated ONLY from the core_provisioner release
          # pinned in driver.version; the intermediate key's passphrase is
          # public by design.
          TAG="$(tr -d '[:space:]' < driver.version)"
          VERSION="${TAG#v}"
          ARCHIVE="core_provisioner-${VERSION}.tar.gz"
          BASE="https://github.com/STARTcloud/core_provisioner/releases/download/${TAG}"
          echo "Fetching core driver ${TAG}"
          curl -fsSL -o "$RUNNER_TEMP/$ARCHIVE" "$BASE/$ARCHIVE"
          curl -fsSL -o "$RUNNER_TEMP/$ARCHIVE.sha256" "$BASE/$ARCHIVE.sha256"
          EXPECTED="$(awk '{print $1}' "$RUNNER_TEMP/$ARCHIVE.sha256")"
          ACTUAL="$(openssl dgst -sha256 -r "$RUNNER_TEMP/$ARCHIVE" | awk '{print $1}')"
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "Checksum mismatch for $ARCHIVE: expected $EXPECTED, got $ACTUAL" >&2
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/core-driver"
          # tar on the Windows runner reads the "D:" in an absolute path as a
          # REMOTE HOSTNAME (the Git-Bash tar colon trap — runtime-proven
          # 2026-07-17: "Cannot connect to D: resolve failed"); extracting
          # with relative paths from inside $RUNNER_TEMP sidesteps it on
          # every OS.
          (cd "$RUNNER_TEMP" && tar -xzf "$ARCHIVE" -C core-driver)
          CA="$RUNNER_TEMP/core-driver/driver/ssls/ca"
          for f in root-ca.crt ca-certificate.crt ca-certificate.key; do
            test -f "$CA/$f" || { echo "$f missing from the core driver archive" >&2; exit 1; }
          done
          mkdir -p packaging/ssl
          cp "$CA/root-ca.crt" packaging/ssl/root-ca.crt
          cp "$CA/ca-certificate.crt" packaging/ssl/ca-certificate.crt
          openssl pkey -in "$CA/ca-certificate.key" -out packaging/ssl/ca-certificate.key -passin 'pass:STARTcloud24@!'

      - name: Build universal binary
        run: |
          mkdir -p bin dist
          export SDKROOT="$(xcrun --sdk macosx --show-sdk-path)"
          LDFLAGS="-s -w -X github.com/Makr91/hyperweaver-agent/internal/version.Version=${{ inputs.version }}"
          CGO_ENABLED=1 GOARCH=arm64 go build -trimpath -ldflags "$LDFLAGS" -o bin/hyperweaver-agent-arm64 .
          CGO_ENABLED=1 GOARCH=amd64 go build -trimpath -ldflags "$LDFLAGS" -o bin/hyperweaver-agent-amd64 .
          lipo -create -output bin/hyperweaver-agent bin/hyperweaver-agent-arm64 bin/hyperweaver-agent-amd64
          lipo -info bin/hyperweaver-agent

      - name: Assemble .app bundle
        # No space in the bundle directory name — composite actions and shell
        # plumbing downstream handle it more reliably; the display name comes
        # from Info.plist.
        run: |
          APP="dist/HyperweaverAgent.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources/ssl-seed"
          cp bin/hyperweaver-agent "$APP/Contents/MacOS/hyperweaver-agent"
          sed "s/__VERSION__/${{ inputs.version }}/g" packaging/macos/Info.plist > "$APP/Contents/Info.plist"
          # STARTcloud PKI seed (Mark's shape-A ruling, sync 2026-07-17):
          # root-ca.crt is the trust anchor the postinstall plants; the
          # intermediate pair signs the agent's certificates (full chain
          # served).
          cp packaging/ssl/root-ca.crt "$APP/Contents/Resources/ssl-seed/root-ca.crt"
          cp packaging/ssl/ca-certificate.crt "$APP/Contents/Resources/ssl-seed/ca.crt"
          cp packaging/ssl/ca-certificate.key "$APP/Contents/Resources/ssl-seed/ca.key"
          # Provisioner seed archives (when staged): extracted by the agent on
          # startup into the user-writable provisioners directory.
          if compgen -G "packaging/provisioners-seed/*" > /dev/null; then
            mkdir -p "$APP/Contents/Resources/provisioners-seed"
            cp packaging/provisioners-seed/* "$APP/Contents/Resources/provisioners-seed/"
          fi

      - name: Sign app
        if: ${{ env.HAVE_MAC_SIGNING == 'true' }}
        uses: Moonshine-IDE/macos-sign-app-action@main
        with:
          app-path: dist/HyperweaverAgent.app
          mac-keychain-pass: ${{ secrets.MAC_KEYCHAIN_PASS }}
          mac-application-certkey: ${{ secrets.MAC_APPLICATION_CERTKEY }}
          mac-certkey-pass: ${{ secrets.MAC_CERTKEY_PASS }}

      - name: Create installer package
        # pkgbuild (not productbuild --component) because only pkgbuild
        # carries install scripts — the postinstall trusts the STARTcloud CA
        # in the System keychain. productbuild then wraps the component into
        # a product archive, scripts preserved.
        run: |
          chmod +x packaging/macos/scripts/postinstall
          pkgbuild \
            --component dist/HyperweaverAgent.app \
            --install-location /Applications \
            --scripts packaging/macos/scripts \
            --identifier com.startcloud.hyperweaver-agent \
            --version ${{ inputs.version }} \
            dist/HyperweaverAgent-Component.pkg
          productbuild \
            --package dist/HyperweaverAgent-Component.pkg \
            dist/HyperweaverAgent-Setup-Unsigned.pkg

      - name: Sign installer
        if: ${{ env.HAVE_MAC_SIGNING == 'true' }}
        uses: Moonshine-IDE/macos-sign-installer-action@v1.0
        with:
          unsigned-pkg-path: dist/HyperweaverAgent-Setup-Unsigned.pkg
          signed-pkg-path: dist/HyperweaverAgent-Setup.pkg
          mac-keychain-pass: ${{ secrets.MAC_KEYCHAIN_PASS }}
          mac-installer-certkey: ${{ secrets.MAC_INSTALLER_CERTKEY }}
          mac-certkey-pass: ${{ secrets.MAC_CERTKEY_PASS }}

      - name: Notarize installer
        if: ${{ env.HAVE_MAC_NOTARIZATION == 'true' }}
        uses: Moonshine-IDE/macos-notarize-action@v1.0
        with:
          app-path: dist/HyperweaverAgent-Setup.pkg
          mac-notarization-apple-id: ${{ secrets.MAC_NOTARIZATION_APPLE_ID }}
          mac-notarization-team-id: ${{ secrets.MAC_NOTARIZATION_TEAM_ID }}
          mac-notarization-pass: ${{ secrets.MAC_NOTARIZATION_PASS }}

      - name: Finalize unsigned package name
        if: ${{ env.HAVE_MAC_SIGNING != 'true' }}
        run: mv dist/HyperweaverAgent-Setup-Unsigned.pkg dist/HyperweaverAgent-Setup.pkg

      - name: Zip app bundle
        run: |
          cd dist
          ditto -c -k --keepParent HyperweaverAgent.app "HyperweaverAgent-${{ inputs.version }}-macos-universal.zip"

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ inputs.tag_name }}" \
            dist/HyperweaverAgent-Setup.pkg \
            "dist/HyperweaverAgent-${{ inputs.version }}-macos-universal.zip" \
            --clobber

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Bake Hyperweaver UI artifact
        run: |
          UI_VERSION="$(tr -d ' \r\n' < .ui-version)"
          echo "Baking hyperweaver-ui v${UI_VERSION}"
          rm -rf internal/webui/dist
          mkdir -p internal/webui/dist
          curl -fsSL "https://github.com/MarkProminic/hyperweaver-ui/releases/download/v${UI_VERSION}/hyperweaver-ui-${UI_VERSION}.tar.gz" | tar -xz -C internal/webui/dist

      - name: Stage provisioner seed archives
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Same seed contract as the Windows job: registry-shaped .tar.gz
          # release assets from the provisioner repos; missing assets tolerated.
          mkdir -p packaging/provisioners-seed
          for repo in STARTcloud/startcloud_generic_provisioner STARTcloud/hcl_domino_standalone_provisioner STARTcloud/hcl_domino_additional_provisioner; do
            # Dual-asset releases (Provisioner AI, 2026-07-06): a versioned
            # tar.gz plus a version-less stable one — fetch ONLY the
            # version-less asset so the seed never carries duplicates.
            asset="${repo##*/}.tar.gz"
            if gh release download --repo "$repo" --pattern "$asset" --dir packaging/provisioners-seed; then
              echo "Staged seed archive(s) from $repo"
            else
              echo "WARNING: no seed archive from $repo — building without it"
            fi
          done
          ls -la packaging/provisioners-seed

      - name: Stage STARTcloud PKI from the pinned core driver
        run: |
          # Same contract as the Windows job's PKI step: packaging/ssl is
          # gitignored, populated ONLY from the core_provisioner release
          # pinned in driver.version; the intermediate key's passphrase is
          # public by design.
          TAG="$(tr -d '[:space:]' < driver.version)"
          VERSION="${TAG#v}"
          ARCHIVE="core_provisioner-${VERSION}.tar.gz"
          BASE="https://github.com/STARTcloud/core_provisioner/releases/download/${TAG}"
          echo "Fetching core driver ${TAG}"
          curl -fsSL -o "$RUNNER_TEMP/$ARCHIVE" "$BASE/$ARCHIVE"
          curl -fsSL -o "$RUNNER_TEMP/$ARCHIVE.sha256" "$BASE/$ARCHIVE.sha256"
          EXPECTED="$(awk '{print $1}' "$RUNNER_TEMP/$ARCHIVE.sha256")"
          ACTUAL="$(openssl dgst -sha256 -r "$RUNNER_TEMP/$ARCHIVE" | awk '{print $1}')"
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "Checksum mismatch for $ARCHIVE: expected $EXPECTED, got $ACTUAL" >&2
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/core-driver"
          # tar on the Windows runner reads the "D:" in an absolute path as a
          # REMOTE HOSTNAME (the Git-Bash tar colon trap — runtime-proven
          # 2026-07-17: "Cannot connect to D: resolve failed"); extracting
          # with relative paths from inside $RUNNER_TEMP sidesteps it on
          # every OS.
          (cd "$RUNNER_TEMP" && tar -xzf "$ARCHIVE" -C core-driver)
          CA="$RUNNER_TEMP/core-driver/driver/ssls/ca"
          for f in root-ca.crt ca-certificate.crt ca-certificate.key; do
            test -f "$CA/$f" || { echo "$f missing from the core driver archive" >&2; exit 1; }
          done
          mkdir -p packaging/ssl
          cp "$CA/root-ca.crt" packaging/ssl/root-ca.crt
          cp "$CA/ca-certificate.crt" packaging/ssl/ca-certificate.crt
          openssl pkey -in "$CA/ca-certificate.key" -out packaging/ssl/ca-certificate.key -passin 'pass:STARTcloud24@!'

      - name: Build
        run: |
          mkdir -p bin dist
          CGO_ENABLED=0 go build -trimpath \
            -ldflags "-s -w -X github.com/Makr91/hyperweaver-agent/internal/version.Version=${{ inputs.version }}" \
            -o bin/hyperweaver-agent .

      - name: Build Debian package
        run: |
          VERSION="${{ inputs.version }}"
          ARCH=amd64
          STAGE="dist/hyperweaver-agent_${VERSION}_${ARCH}"
          mkdir -p "$STAGE"/usr/bin \
                   "$STAGE"/etc/hyperweaver-agent/ssl \
                   "$STAGE"/etc/systemd/system \
                   "$STAGE"/usr/share/applications \
                   "$STAGE"/usr/share/icons/hicolor/192x192/apps \
                   "$STAGE"/usr/share/man/man8 \
                   "$STAGE"/usr/share/man/man5 \
                   "$STAGE"/DEBIAN
          cp bin/hyperweaver-agent "$STAGE/usr/bin/"
          cp packaging/config/production-config.yaml "$STAGE/etc/hyperweaver-agent/config.yaml"
          # STARTcloud PKI (Mark's shape-A ruling, sync 2026-07-17): the
          # intermediate pair signs the agent's certificates (full chain
          # served); root-ca.crt is the trust anchor postinst plants
          # system-wide.
          cp packaging/ssl/root-ca.crt "$STAGE/etc/hyperweaver-agent/ssl/root-ca.crt"
          cp packaging/ssl/ca-certificate.crt "$STAGE/etc/hyperweaver-agent/ssl/ca.crt"
          cp packaging/ssl/ca-certificate.key "$STAGE/etc/hyperweaver-agent/ssl/ca.key"
          cp packaging/DEBIAN/systemd/hyperweaver-agent.service "$STAGE/etc/systemd/system/"
          cp packaging/linux/hyperweaver-agent.desktop "$STAGE/usr/share/applications/"
          cp internal/tray/assets/icon.png "$STAGE/usr/share/icons/hicolor/192x192/apps/hyperweaver-agent.png"
          gzip -9 -c packaging/DEBIAN/man/hyperweaver-agent.8 > "$STAGE/usr/share/man/man8/hyperweaver-agent.8.gz"
          gzip -9 -c packaging/DEBIAN/man/hyperweaver-agent.yaml.5 > "$STAGE/usr/share/man/man5/hyperweaver-agent.yaml.5.gz"
          # Provisioner seed archives (when staged): the agent's Linux seed
          # location — extracted on startup, never overwriting existing versions.
          if compgen -G "packaging/provisioners-seed/*" > /dev/null; then
            mkdir -p "$STAGE/usr/share/hyperweaver-agent/provisioners-seed"
            cp packaging/provisioners-seed/* "$STAGE/usr/share/hyperweaver-agent/provisioners-seed/"
          fi
          cp packaging/DEBIAN/postinst packaging/DEBIAN/prerm packaging/DEBIAN/postrm "$STAGE/DEBIAN/"

          cat > "$STAGE/DEBIAN/control" << EOF
          Package: hyperweaver-agent
          Version: ${VERSION}
          Section: misc
          Priority: optional
          Architecture: ${ARCH}
          Maintainer: Makr91 <makr91@users.noreply.github.com>
          Description: Hyperweaver Agent - VirtualBox/Vagrant host-agent
           Single-binary host-agent with a system-tray icon that serves the
           Hyperweaver web UI to the user's own browser. Runs headless as a
           systemd service or as a desktop tray application.
          Homepage: https://github.com/Makr91/hyperweaver-agent
          EOF

          find "$STAGE" -type d -exec chmod 755 {} \;
          find "$STAGE" -type f -exec chmod 644 {} \;
          chmod 755 "$STAGE/usr/bin/hyperweaver-agent" "$STAGE/DEBIAN"/postinst "$STAGE/DEBIAN"/prerm "$STAGE/DEBIAN"/postrm

          dpkg-deb --build --root-owner-group "$STAGE" "dist/hyperweaver-agent_${VERSION}_${ARCH}.deb"

      - name: Tar bare binary
        run: |
          tar -C bin -czf "dist/HyperweaverAgent-${{ inputs.version }}-linux-amd64.tar.gz" hyperweaver-agent

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ inputs.tag_name }}" \
            "dist/hyperweaver-agent_${{ inputs.version }}_amd64.deb" \
            "dist/HyperweaverAgent-${{ inputs.version }}-linux-amd64.tar.gz" \
            --clobber

  checksums:
    name: Publish checksums
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Generate and upload SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir assets && cd assets
          gh release download "${{ inputs.tag_name }}" \
            --pattern 'HyperweaverAgent-*' \
            --pattern 'hyperweaver-agent_*'
          sha256sum HyperweaverAgent-* hyperweaver-agent_* > SHA256SUMS.txt
          gh release upload "${{ inputs.tag_name }}" SHA256SUMS.txt --clobber

      - name: Generate and upload update-info.json
        # The in-app update check polls this document at the stable
        # releases/latest/download URL (SHI's versioninfo.json model).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The platform URLs + checksumsUrl feed POST /app/updates/apply:
          # the agent downloads its installer, verifies it against
          # SHA256SUMS.txt (mandatory), launches it, and exits.
          DL="https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag_name }}"
          cat > update-info.json << EOF
          {
            "version": "${{ inputs.version }}",
            "releaseUrl": "https://github.com/${{ github.repository }}/releases/tag/${{ inputs.tag_name }}",
            "releaseDate": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "changelog": "https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md",
            "windowsUrl": "${DL}/HyperweaverAgent-Setup.exe",
            "macosUrl": "${DL}/HyperweaverAgent-Setup.pkg",
            "linuxUrl": "${DL}/hyperweaver-agent_${{ inputs.version }}_amd64.deb",
            "checksumsUrl": "${DL}/SHA256SUMS.txt"
          }
          EOF
          gh release upload "${{ inputs.tag_name }}" update-info.json --clobber
