name: Weekly Vulnerability Scan

# CI runs govulncheck on every PR (new dependencies); this schedule catches
# newly disclosed CVEs against unchanged code.
on:
  schedule:
    - cron: '15 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
