# Dependabot configuration for Hyperweaver Agent
# Automatically keeps dependencies up to date

version: 2
updates:
  # Go module dependencies
  - package-ecosystem: 'gomod'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
    labels:
      - 'dependencies'
      - 'automated'
    commit-message:
      # W6: every commit is a fix — releases only ever bump patch.
      prefix: 'fix'
      include: 'scope'

  # GitHub Actions used by the workflows
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 5
    labels:
      - 'github-actions'
      - 'dependencies'
    commit-message:
      prefix: 'fix'
